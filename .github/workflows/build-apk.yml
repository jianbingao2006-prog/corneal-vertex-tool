name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Install expect (for driving interactive prompts)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq expect

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli@latest

      - name: Pre-configure Bubblewrap (skip JDK/SDK install prompts)
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json <<EOF
          {
            "jdkPath": "${JAVA_HOME}",
            "androidSdkPath": "${ANDROID_HOME}"
          }
          EOF
          echo "=== Bubblewrap config ==="
          cat ~/.bubblewrap/config.json
          echo "=== JDK ==="
          "${JAVA_HOME}/bin/java" -version
          echo "=== Android SDK ==="
          ls "${ANDROID_HOME}" || echo "ANDROID_HOME not set"

      - name: Initialize TWA project (driven by expect)
        run: |
          mkdir -p twa
          cat > /tmp/init.exp <<'EXPECT_EOF'
          #!/usr/bin/expect -f
          set timeout 300
          set manifest_url "https://sprightly-souffle-b46046.netlify.app/manifest.webmanifest"

          spawn bubblewrap init --manifest=$manifest_url --directory=./twa --skipPwaValidation

          expect {
            -re {First and Last names}        { send "Corneal Vertex Tool\r"; exp_continue }
            -re {Organizational Unit}         { send "Personal\r"; exp_continue }
            -re {Organization}                { send "Personal\r"; exp_continue }
            -re {Country}                     { send "CN\r"; exp_continue }
            -re {City}                        { send "Beijing\r"; exp_continue }
            -re {State}                       { send "Beijing\r"; exp_continue }
            -re {[Pp]assword for the [Kk]ey [Ss]tore} { send "android123\r"; exp_continue }
            -re {[Pp]assword for the [Kk]ey}  { send "android123\r"; exp_continue }
            -re {Confirm password}            { send "android123\r"; exp_continue }
            -re {Project generated successfully} { exp_continue }
            -re {.*\? .*}                     { send "\r"; exp_continue }
            timeout                           { puts "TIMEOUT"; exit 2 }
            eof
          }
          EXPECT_EOF
          chmod +x /tmp/init.exp
          /tmp/init.exp 2>&1 | tee init.log

          echo "=========== After init ==========="
          ls -la twa/ || true
          echo "=========== twa-manifest.json ==========="
          cat twa/twa-manifest.json 2>/dev/null || echo "(no twa-manifest.json yet)"

      - name: Build APK (driven by expect)
        working-directory: twa
        run: |
          cat > /tmp/build.exp <<'EXPECT_EOF'
          #!/usr/bin/expect -f
          set timeout 1200

          spawn bubblewrap build --skipPwaValidation

          expect {
            -re {[Pp]assword for the [Kk]ey [Ss]tore} { send "android123\r"; exp_continue }
            -re {[Pp]assword for the [Kk]ey}          { send "android123\r"; exp_continue }
            timeout                                    { puts "TIMEOUT"; exit 2 }
            eof
          }
          EXPECT_EOF
          chmod +x /tmp/build.exp
          /tmp/build.exp 2>&1 | tee build.log

          echo "=========== After build ==========="
          ls -la *.apk *.aab *.keystore 2>/dev/null || ls -la

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: corneal-vertex-tool-apk
          path: |
            twa/app-release-signed.apk
            twa/app-release-bundle.aab
            twa/android.keystore
            twa/twa-manifest.json
            twa/init.log
            twa/build.log
          retention-days: 30
          if-no-files-found: warn
